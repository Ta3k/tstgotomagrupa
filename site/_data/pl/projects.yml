logo_image2: '/images/gotoma_general 1.svg'
logo_image3: '/images/codarius.svg' # You can add own logo. For example '/images/logo.png'.
      
header_href: 'o-grupie'
header:  'Liczby, klienci i rezultaty'

item1:  'Długofalowa współpraca, jasna komunikacja i odpowiedzialność za projekt to elementy, które klienci najczęściej wskazują w swoich opiniach.'
item2:  '13+'
item3:  'lat sukcesów na rynku'
item4:  '300+'
item5:  'zrealizowanych projektów'
item6:  '70+'
item7:  'ekspertów gotowych pomóc'
item8:  'Oficjalne partnerstwo'
item9:  'Wdrażamy, konfigurujemy i rozwijamy system ERP enova365, dopasowując go do realnych procesów biznesowych naszych klientów — od finansów po zarządzanie zasobami.'
item10:  'Członkostwo w klastrze przemysłowym'
item11:  'Aktywnie uczestniczymy w rozwoju innowacji przemysłowych, współpracując z firmami i instytucjami w obszarze cyfryzacji, automatyzacji i nowoczesnych technologii.'
item12:  'ERP Factory, rozwijamy własne produkty'
item13:  'Projektujemy i rozwijamy własny system ERP dla produkcji i biznesu, który odpowiada na realne potrzeby operacyjne - od planowania po kontrolę procesów.'
      
