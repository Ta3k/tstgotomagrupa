    <script>
    // Initialize CookieDialog
    const CONFIG = {
      googleAnalyticsId: 'G-NRBTRG0DB8', // Replace with your GA4 Measurement ID
    };

    // Initialize Google Analytics with denied consent by default
    function initializeGoogleAnalytics() {
      if (window.gtag) {
        console.log('Google Analytics already loaded');
        return;
      }

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://www.googletagmanager.com/gtag/js?id=${CONFIG.googleAnalyticsId}`;
      document.head.appendChild(script);

      script.onload = function() {
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag('js', new Date());

        // Set default consent state - everything denied for GDPR compliance
        gtag('consent', 'default', {
          'ad_storage': 'denied',
          'ad_user_data': 'denied',
          'ad_personalization': 'denied',
          'analytics_storage': 'denied',
          'wait_for_update': 500 // Wait 500ms for consent update
        });

        // Initialize GA4 with privacy-friendly settings
        gtag('config', CONFIG.googleAnalyticsId, {
          'anonymize_ip': true,
          'cookie_flags': 'SameSite=Strict;Secure'
        });

        console.log('Google Analytics loaded with default denied consent');
      };
    }

    // Update Google Analytics consent based on user choices
    function updateGoogleConsent(consent) {
      if (window.gtag && consent && consent.categories) {
        window.gtag('consent', 'update', {
          'analytics_storage': consent.categories.analytics ? 'granted' : 'denied',
          'ad_storage': consent.categories.marketing ? 'granted' : 'denied',
          'ad_user_data': consent.categories.marketing ? 'granted' : 'denied',
          'ad_personalization': consent.categories.marketing ? 'granted' : 'denied'
        });

        console.log('GA4 consent updated:', {
          analytics: consent.categories.analytics ? 'granted' : 'denied',
          advertising: consent.categories.marketing ? 'granted' : 'denied'
        });
      }
    }

    // Initialize everything on page load
    window.addEventListener('load', function() {
      // Initialize CookieDialog first
      const dialog = CookieDialog.init({
        privacyUrl: '/privacy',
        categories: [
          {
            id: 'necessary',
            name: 'Funkcjonalne',
            description: '',
            required: true
          },
          {
            id: 'analytics',
            name: 'Statystyka',
            description: '',
            required: false
          },
          {
            id: 'marketing',
            name: 'Marketing',
            description: '',
            required: false
          }
        ],
        theme: 'dark',
        translations: {
          title: "Zarządzaj zgodą",
          description: 'Aby zapewnić jak najlepsze wrażenia, korzystamy z technologii, takich jak pliki cookie, do przechowywania i/lub uzyskiwania dostępu do informacji o urządzeniu. Zgoda na te technologie pozwoli nam przetwarzać dane, takie jak zachowanie podczas przeglądania lub unikalne identyfikatory na tej stronie. Brak wyrażenia zgody lub wycofanie zgody może niekorzystnie wpłynąć na niektóre cechy i funkcje.',
          acceptButton: "Akceptuję",
          rejectButton: 'Odmów',
          settingsButton: 'Zarządzaj zgodą',
          saveButton: 'Zapisz preferencje',
          closeButton: 'Zamknij',
          necessary: 'Wymagane',
          analytics: 'Analityka',
          marketing: 'Marketing',
          privacyLink: 'Polityka prywatności'
        },
        onAccept: function(consent) {
          updateGoogleConsent(consent);
          console.log('Analytics enabled');
        },
        onReject: function(consent) {
          updateGoogleConsent(consent);
        },
        onChange: function(consent) {
          updateGoogleConsent(consent);
        }
      });

      // Load Google Analytics after CookieDialog initialization
      const hasExistingConsent = dialog.hasConsent();
      const existingConsent = hasExistingConsent ? dialog.getConsent() : null;

      // Initialize Google Analytics with current consent state
      initializeGoogleAnalytics(existingConsent);
    });
